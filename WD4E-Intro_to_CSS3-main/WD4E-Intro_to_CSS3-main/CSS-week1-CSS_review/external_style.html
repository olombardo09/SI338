<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Styling Rules</title>

    <!-- When you want to use a stylesheet, link it in the head.
    If you start typing "link" you will see an option for css -->
    <link rel="stylesheet" href="css/externalStyle.css">

    <!-- Here is the internal Styling -->
    <style>
        h1{color: black;}
    </style>
</head>
<body>
      <main>
        <h1>Styled Heading</h1>

        <p>Just adding a few paragraphs to show you that they are ALL styled, not just one.</p>

        <p>See?  Doesn't this look beautiful? Both of the paragraphs are red.</p>

    </main>
</body>
</html>
